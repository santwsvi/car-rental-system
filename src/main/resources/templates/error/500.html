<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>500 — Erro Interno</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}"/>
</head>
<body>
<header class="navbar">
    <div class="container navbar-content">
        <a th:href="@{/}" class="navbar-brand">🚗 <span>Car Rental System</span></a>
        <nav class="navbar-nav">
            <a th:href="@{/clients}" class="nav-link">Clientes</a>
            <a th:href="@{/rental-requests}" class="nav-link">Pedidos</a>
            <a th:href="@{/agent/requests}" class="nav-link">Painel Agente</a>
        </nav>
    </div>
</header>
<main class="container main-content">
    <div class="error-page">
        <h1>500</h1>
        <h2>Erro Interno do Servidor</h2>
        <p th:text="${message} ?: 'Ocorreu um erro inesperado. Tente novamente mais tarde.'"></p>
        <a th:href="@{/clients}" class="btn btn-primary">← Voltar à lista de clientes</a>
    </div>
</main>
<footer class="footer">
    <div class="container"><p>© 2026 Car Rental System — PUC Minas · Engenharia de Software</p></div>
</footer>
</body>
</html>
