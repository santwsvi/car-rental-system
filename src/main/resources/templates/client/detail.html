<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Detalhes do Cliente — Car Rental System'">Detalhes</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}"/>
</head>
<body>

<header class="navbar">
    <div class="container navbar-content">
        <a th:href="@{/}" class="navbar-brand">🚗 <span>Car Rental System</span></a>
        <nav class="navbar-nav">
            <a th:href="@{/clients}" class="nav-link">Clientes</a>
            <a th:href="@{/rental-requests}" class="nav-link">Pedidos</a>
            <a th:href="@{/agent/requests}" class="nav-link">Painel Agente</a>
        </nav>
    </div>
</header>

<main class="container main-content">

    <div class="page-header">
        <h1 th:text="'Cliente: ' + ${client.name}">Detalhes do Cliente</h1>
        <div class="header-actions">
            <a th:href="@{/clients/{id}/edit(id=${client.id})}" class="btn btn-warning">Editar</a>
            <a th:href="@{/clients}" class="btn btn-secondary">Voltar</a>
        </div>
    </div>

    <!-- Dados Pessoais -->
    <section class="card">
        <h2>Dados Pessoais</h2>
        <div class="detail-grid">
            <div class="detail-item">
                <label>ID</label>
                <span th:text="${client.id}"></span>
            </div>
            <div class="detail-item">
                <label>Nome</label>
                <span th:text="${client.name}"></span>
            </div>
            <div class="detail-item">
                <label>E-mail</label>
                <span th:text="${client.email}"></span>
            </div>
            <div class="detail-item">
                <label>CPF</label>
                <span th:text="${client.cpf}"></span>
            </div>
            <div class="detail-item">
                <label>RG</label>
                <span th:text="${client.rg}"></span>
            </div>
            <div class="detail-item">
                <label>Profissão</label>
                <span th:text="${client.profession} ?: '—'"></span>
            </div>
            <div class="detail-item">
                <label>Cadastrado em</label>
                <span th:text="${client.createdAt != null ? client.createdAt.toString().substring(0,16).replace('T',' ') : '—'}"></span>
            </div>
        </div>
    </section>

    <!-- Endereço -->
    <section class="card" th:if="${client.address != null}">
        <h2>Endereço</h2>
        <div class="detail-grid">
            <div class="detail-item">
                <label>Rua</label>
                <span th:text="${client.address.street + ', ' + client.address.number}"></span>
            </div>
            <div class="detail-item" th:if="${client.address.complement != null and !client.address.complement.isEmpty()}">
                <label>Complemento</label>
                <span th:text="${client.address.complement}"></span>
            </div>
            <div class="detail-item">
                <label>Cidade</label>
                <span th:text="${client.address.city}"></span>
            </div>
            <div class="detail-item">
                <label>Estado</label>
                <span th:text="${client.address.state}"></span>
            </div>
            <div class="detail-item">
                <label>CEP</label>
                <span th:text="${client.address.zipCode}"></span>
            </div>
            <div class="detail-item">
                <label>País</label>
                <span th:text="${client.address.country}"></span>
            </div>
        </div>
    </section>

    <!-- Empregadores -->
    <section class="card">
        <h2>Empregadores</h2>
        <div th:if="${client.employers != null and !client.employers.isEmpty()}">
            <table class="table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nome da Empresa</th>
                        <th>Rendimento (R$)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="employer, stat : ${client.employers}">
                        <td th:text="${stat.index + 1}"></td>
                        <td th:text="${employer.name}"></td>
                        <td th:text="${#numbers.formatDecimal(employer.income, 1, 'POINT', 2, 'COMMA')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <p th:if="${client.employers == null or client.employers.isEmpty()}" class="text-muted">
            Nenhum empregador cadastrado.
        </p>
    </section>

    <!-- Ações -->
    <div class="form-actions">
        <a th:href="@{/clients/{id}/edit(id=${client.id})}" class="btn btn-warning">Editar</a>
        <form th:action="@{/clients/{id}/delete(id=${client.id})}" method="post" class="inline-form"
              onsubmit="return confirm('Tem certeza que deseja excluir este cliente?');">
            <button type="submit" class="btn btn-danger">Excluir</button>
        </form>
        <a th:href="@{/clients}" class="btn btn-secondary">Voltar à lista</a>
    </div>

</main>

<footer class="footer">
    <div class="container">
        <p>© 2026 Car Rental System — PUC Minas · Engenharia de Software</p>
    </div>
</footer>

</body>
</html>
