<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Detalhes do Pedido — Car Rental System</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}"/>
</head>
<body>

<header class="navbar">
    <div class="container navbar-content">
        <a th:href="@{/}" class="navbar-brand">🚗 <span>Car Rental System</span></a>
        <nav class="navbar-nav">
            <a th:href="@{/clients}" class="nav-link">Clientes</a>
            <a th:href="@{/rental-requests}" class="nav-link">Pedidos</a>
            <a th:href="@{/agent/requests}" class="nav-link">Painel Agente</a>
        </nav>
    </div>
</header>

<main class="container main-content">

    <div class="page-header">
        <h1 th:text="'Pedido #' + ${request.id}">Detalhes do Pedido</h1>
        <div class="header-actions">
            <a th:if="${request.canModify}" th:href="@{/rental-requests/{id}/edit(id=${request.id})}" class="btn btn-warning">Editar</a>
            <a th:href="@{/rental-requests}" class="btn btn-secondary">Voltar</a>
        </div>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <section class="card">
        <h2>Informações do Pedido</h2>
        <div class="detail-grid">
            <div class="detail-item">
                <label>ID</label>
                <span th:text="${request.id}"></span>
            </div>
            <div class="detail-item">
                <label>Cliente</label>
                <span th:text="${request.clientName}"></span>
            </div>
            <div class="detail-item">
                <label>Data de Início</label>
                <span th:text="${request.startDate}"></span>
            </div>
            <div class="detail-item">
                <label>Data de Término</label>
                <span th:text="${request.endDate}"></span>
            </div>
            <div class="detail-item">
                <label>Status</label>
                <span class="badge"
                      th:classappend="${request.status == 'APPROVED' ? 'badge-success' :
                                       request.status == 'REJECTED' ? 'badge-danger' :
                                       request.status == 'CANCELLED' ? 'badge-danger' :
                                       request.status == 'CONTRACTED' ? 'badge-info' :
                                       'badge-warning'}"
                      th:text="${request.status}"></span>
            </div>
            <div class="detail-item" th:if="${request.evaluatedBy != null}">
                <label>Avaliado por</label>
                <span th:text="${request.evaluatedBy + ' (' + request.evaluatedByRole + ')'}"></span>
            </div>
            <div class="detail-item">
                <label>Criado em</label>
                <span th:text="${request.createdAt != null ? request.createdAt.toString().substring(0,16).replace('T',' ') : '—'}"></span>
            </div>
            <div class="detail-item">
                <label>Atualizado em</label>
                <span th:text="${request.updatedAt != null ? request.updatedAt.toString().substring(0,16).replace('T',' ') : '—'}"></span>
            </div>
        </div>
    </section>

    <section class="card" th:if="${request.notes != null and !request.notes.isEmpty()}">
        <h2>Observações</h2>
        <p th:text="${request.notes}" style="white-space: pre-wrap;"></p>
    </section>

    <section class="card" th:if="${request.car != null}">
        <h2>Automóvel</h2>
        <div class="detail-grid">
            <div class="detail-item"><label>Matrícula</label><span th:text="${request.car.registration}"></span></div>
            <div class="detail-item"><label>Marca</label><span th:text="${request.car.brand}"></span></div>
            <div class="detail-item"><label>Modelo</label><span th:text="${request.car.model}"></span></div>
            <div class="detail-item"><label>Ano</label><span th:text="${request.car.year}"></span></div>
            <div class="detail-item"><label>Placa</label><span th:text="${request.car.plate}"></span></div>
        </div>
    </section>

    <div class="form-actions">
        <a th:if="${request.canModify}" th:href="@{/rental-requests/{id}/edit(id=${request.id})}" class="btn btn-warning">Editar</a>
        <form th:if="${request.canCancel}" th:action="@{/rental-requests/{id}/cancel(id=${request.id})}" method="post" class="inline-form"
              onsubmit="return confirm('Tem certeza que deseja cancelar este pedido?');">
            <button type="submit" class="btn btn-danger">Cancelar Pedido</button>
        </form>
        <a th:href="@{/rental-requests}" class="btn btn-secondary">Voltar à lista</a>
    </div>

</main>

<footer class="footer">
    <div class="container">
        <p>© 2026 Car Rental System — PUC Minas · Engenharia de Software</p>
    </div>
</footer>

</body>
</html>
