<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Modificar Pedido (Agente) — Car Rental System</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}"/>
</head>
<body>

<header class="navbar">
    <div class="container navbar-content">
        <a th:href="@{/}" class="navbar-brand">🚗 <span>Car Rental System</span></a>
        <nav class="navbar-nav">
            <a th:href="@{/clients}" class="nav-link">Clientes</a>
            <a th:href="@{/rental-requests}" class="nav-link">Pedidos</a>
            <a th:href="@{/agent/requests}" class="nav-link active">Painel Agente</a>
        </nav>
    </div>
</header>

<main class="container main-content">

    <div class="breadcrumb">
        <a th:href="@{/agent/requests}">Painel Agente</a>
        <span class="breadcrumb-separator">›</span>
        <a th:href="@{/agent/requests/{id}(id=${requestId})}" th:text="'Pedido #' + ${requestId}">Pedido</a>
        <span class="breadcrumb-separator">›</span>
        <span>Modificar</span>
    </div>

    <div class="page-header">
        <h1 th:text="'Modificar Pedido #' + ${requestId}">Modificar</h1>
        <a th:href="@{/agent/requests}" class="btn btn-secondary">← Voltar</a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/agent/requests/{id}/edit(id=${requestId})}" method="post" class="form-card">

        <fieldset class="form-section">
            <legend>🏢 Dados do Agente</legend>
            <div class="form-row">
                <div class="form-group">
                    <label for="agentName">Nome do Agente *</label>
                    <input type="text" id="agentName" name="agentName" class="form-control" value="Agente Avaliador" required/>
                </div>
            </div>
        </fieldset>

        <fieldset class="form-section">
            <legend>📋 Dados do Pedido</legend>
            <div class="form-row">
                <div class="form-group">
                    <label for="startDate">Data de Início *</label>
                    <input type="date" id="startDate" name="startDate"
                           th:value="${requestForm != null and requestForm.startDate != null ? requestForm.startDate : ''}"
                           class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="endDate">Data de Término *</label>
                    <input type="date" id="endDate" name="endDate"
                           th:value="${requestForm != null and requestForm.endDate != null ? requestForm.endDate : ''}"
                           class="form-control" required/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group flex-2">
                    <label for="notes">Observações do Agente</label>
                    <textarea id="notes" name="notes" class="form-control" rows="4" placeholder="Modificações realizadas pelo agente..."></textarea>
                </div>
            </div>
        </fieldset>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Salvar Modificações</button>
            <a th:href="@{/agent/requests}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>

</main>

<footer class="footer">
    <div class="container">
        <p>© 2026 Car Rental System — PUC Minas · Engenharia de Software</p>
    </div>
</footer>

</body>
</html>
