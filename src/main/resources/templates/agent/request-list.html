<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Painel do Agente — Car Rental System</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}"/>
</head>
<body>

<header class="navbar">
    <div class="container navbar-content">
        <a th:href="@{/}" class="navbar-brand">🚗 <span>Car Rental System</span></a>
        <nav class="navbar-nav">
            <a th:href="@{/clients}" class="nav-link">Clientes</a>
            <a th:href="@{/rental-requests}" class="nav-link">Pedidos</a>
            <a th:href="@{/agent/requests}" class="nav-link active">Painel Agente</a>
        </nav>
    </div>
</header>

<main class="container main-content">

    <div class="page-header">
        <div>
            <h1>🏢 Painel do Agente</h1>
            <p class="page-header-subtitle">Avalie pedidos, aprove contratos e gerencie crédito</p>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="table-responsive" th:if="${!requests.isEmpty()}">
        <table class="table">
            <thead>
                <tr>
                    <th>Pedido</th>
                    <th>Cliente</th>
                    <th>Período</th>
                    <th>Status</th>
                    <th>Avaliador</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="req : ${requests}">
                    <td class="td-id" th:text="'#' + ${req.id}"></td>
                    <td class="td-name" th:text="${req.clientName}"></td>
                    <td class="td-date" th:text="${req.startDate + ' → ' + req.endDate}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${req.status == 'APPROVED' ? 'badge-success' :
                                               req.status == 'REJECTED' ? 'badge-danger' :
                                               req.status == 'CANCELLED' ? 'badge-danger' :
                                               req.status == 'CONTRACTED' ? 'badge-info' :
                                               req.status == 'UNDER_REVIEW' ? 'badge-purple' :
                                               'badge-warning'}"
                              th:text="${req.status == 'PENDING' ? 'Pendente' :
                                        req.status == 'UNDER_REVIEW' ? 'Em Análise' :
                                        req.status == 'APPROVED' ? 'Aprovado' :
                                        req.status == 'REJECTED' ? 'Rejeitado' :
                                        req.status == 'CONTRACTED' ? 'Contratado' :
                                        req.status == 'CANCELLED' ? 'Cancelado' : req.status}"></span>
                    </td>
                    <td th:text="${req.evaluatedBy} ?: '—'"></td>
                    <td class="actions">
                        <a th:href="@{/agent/requests/{id}(id=${req.id})}" class="btn btn-sm btn-primary">Avaliar →</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${requests.isEmpty()}" class="empty-state">
        <div class="empty-state-icon">📊</div>
        <p>Nenhum pedido para avaliação</p>
    </div>

</main>

<footer class="footer">
    <div class="container">
        <p>© 2026 Car Rental System — PUC Minas · Engenharia de Software</p>
    </div>
</footer>

</body>
</html>
