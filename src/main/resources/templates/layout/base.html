<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — Car Rental System'">Car Rental System</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}"/>
</head>
<body>

<!-- ═══ HEADER / NAVBAR ═══ -->
<header class="navbar">
    <div class="container navbar-content">
        <a th:href="@{/}" class="navbar-brand">
            🚗 <span>Car Rental System</span>
        </a>
        <nav class="navbar-nav">
            <a th:href="@{/clients}" class="nav-link">Clientes</a>
            <a th:href="@{/logout}" class="nav-link" style="color: var(--color-danger);">Sair</a>
        </nav>
    </div>
</header>

<!-- ═══ CONTEÚDO PRINCIPAL ═══ -->
<main class="container main-content">
    <div th:replace="${content}">
        <!-- Conteúdo da página será inserido aqui -->
    </div>
</main>

<!-- ═══ FOOTER ═══ -->
<footer class="footer">
    <div class="container">
        <p>© 2026 Car Rental System — PUC Minas · Engenharia de Software</p>
    </div>
</footer>

</body>
</html>
